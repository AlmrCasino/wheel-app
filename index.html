<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عجلة الحظ - AlmrCasino</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>🎡 عجلة الحظ</h1>
      <p>أكمل شرط الإيداع اليومي ثم جرّب حظك.</p>

      <div class="wheel-wrap">
        <div class="pointer">▼</div>
        <canvas id="wheel" width="520" height="520"></canvas>
      </div>

      <button id="spinButton" type="button">تدوير العجلة</button>

      <div id="result" class="result">
        اضغط على الزر لبدء الدوران.
      </div>

      <section class="conditions">
        <h2>شروط اللعب</h2>
        <ul>
          <li>🎁 2,500 ل.س</li>
          <li>🎁 5,000 ل.س</li>
          <li>🎁 10,000 ل.س</li>
          <li>🎁 25,000 ل.س</li>
          <li>🎟️ محاولة مجانية</li>
          <li>💸 خصم من العمولة</li>
        </ul>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
